<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Survey</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }

        h1 {
            font-size: 1.4em;
            margin-bottom: 10px;
        }

        form {
            background-color: white;
            padding: 20px;
            border: 1px solid #999;
            max-width: 400px;
        }

        label {
            display: block;
            margin-bottom: 4px;
        }

        input[type="text"],
        input[type="email"] {
            width: 200px;
            padding: 3px;
            margin-bottom: 10px;
            border: 1px solid #999;
        }

        textarea {
            width: 100%;
            padding: 3px;
            border: 1px solid #999;
        }

        fieldset {
            margin: 10px 0;
            padding: 8px;
            border: 1px solid #999;
        }

        legend {
            font-size: 0.9em;
        }

        select {
            display: block;
            width: 200px;
            height: 60px;
            margin-bottom: 10px;
        }

        input[type="submit"],
        input[type="reset"] {
            padding: 4px 12px;
            margin-top: 10px;
            margin-right: 5px;
        }

        .form-row {
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <form action="http://www.uyar.com/teaching/ecc006/2017spring/login.php" method="post">
        <h1>Music Survey</h1>

        <div class="form-row">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name">
        </div>

        <div class="form-row">
            <label for="email">E-Mail:</label>
            <input type="email" id="email" name="email">
        </div>

        <fieldset>
            <legend>Select Your Favorite Types of Music:</legend>
            <label><input type="checkbox" name="music" value="pop"> Pop</label>
            <label><input type="checkbox" name="music" value="classical"> Classical</label>
            <label><input type="checkbox" name="music" value="rock"> Rock</label>
            <label><input type="checkbox" name="music" value="folk"> Folk</label>
            <label><input type="checkbox" name="music" value="rap"> Rap</label>
            <label><input type="checkbox" name="music" value="other"> Other</label>
        </fieldset>

        <fieldset>
            <legend>Select how often you purchase Music CDs:</legend>
            <label><input type="radio" name="purchase" value="weekly"> Weekly</label>
            <label><input type="radio" name="purchase" value="few" checked> A few CDs each year</label>
            <label><input type="radio" name="purchase" value="monthly"> Monthly</label>
            <label><input type="radio" name="purchase" value="never"> Never purchase</label>
        </fieldset>

        <div class="form-row">
            <label for="location">Select the locations you listen to Music:</label>
            <select id="location" name="location" multiple>
                <option value="home" selected>At home</option>
                <option value="car">In the car</option>
                <option value="mp3">Anywhere (MP3 Player)</option>
                <option value="work">At work</option>
            </select>
        </div>

        <div class="form-row">
            <label for="role">What role does music play in your life?</label>
            <textarea id="role" name="role" cols="60" rows="3"></textarea>
        </div>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    </form>
</body>
</html>
